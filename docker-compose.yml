services:
  postgres:
    image: postgres:15-alpine
    container_name: heiselian_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: heiselian
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: heiselian_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass redis123

volumes:
  postgres_data: