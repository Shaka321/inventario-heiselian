name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Lint backend
        run: npm run lint

      - name: Type check backend
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm run test

      - name: Build backend
        run: npm run build